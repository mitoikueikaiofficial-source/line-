<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title id="pageTitle">LINE連携 | 食数投票システム</title>
  <!-- LIFF SDK -->
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root {
      --primary-color: #06C755;
      --primary-hover: #05b04a;
      --bg-gradient: linear-gradient(135deg, #06C755 0%, #00a844 100%);
    }

    body.mode-dorm-mother {
      --primary-color: #F57C00;
      --primary-hover: #e65100;
      --bg-gradient: linear-gradient(135deg, #FF9800 0%, #F57C00 100%);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
      background: var(--bg-gradient);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: background 0.3s;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 36px 28px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.18);
      text-align: center;
      position: relative;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #111;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: #666;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .info-box {
      background: #f0faf4;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 20px;
      text-align: left;
      font-size: 13px;
      color: #333;
      line-height: 1.7;
    }

    body.mode-dorm-mother .info-box {
      background: #fff8e1;
    }

    .info-box strong {
      color: var(--primary-color);
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 8px;
      text-align: left;
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      font-size: 28px;
      letter-spacing: 12px;
      text-align: center;
      border: 2px solid #ddd;
      border-radius: 12px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
      font-weight: 700;
      color: #111;
    }

    input[type="text"]:focus {
      border-color: var(--primary-color);
    }

    .btn {
      width: 100%;
      padding: 15px;
      background: var(--primary-color);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-bottom: 10px;
    }

    .btn:hover {
      background: var(--primary-hover);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .status-box {
      margin-top: 18px;
      font-size: 14px;
      line-height: 1.6;
      padding: 12px;
      border-radius: 8px;
    }

    .status-box.success {
      background-color: #e8f5e9;
      color: #2e7d32;
      font-weight: 700;
    }

    .status-box.error {
      background-color: #ffebee;
      color: #e53e3e;
      font-weight: 600;
    }

    .status-box.loading {
      color: #888;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid #ccc;
      border-top-color: var(--primary-color);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    #modeSwitchBtn {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 11px;
      color: #bbb;
      background: none;
      border: 1px solid #eee;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
    }

    #debugArea {
      margin-top: 20px;
      font-size: 10px;
      color: #aaa;
      text-align: left;
      border-top: 1px dashed #eee;
      padding-top: 10px;
      display: none;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <!-- モード強制切り替えボタン (自動検知失敗時の予備) -->
    <button id="modeSwitchBtn" onclick="toggleModeManually()">表示切替</button>

    <div id="logo" class="logo">🔗</div>
    <h1 id="headerTitle">LINEアカウント連携</h1>
    <p id="pageSubtitle" class="subtitle">食数投票システムとLINEを繋いで<br>通知・投票をより便利に！</p>

    <!-- 初期表示: LINEログイン確認 -->
    <div id="initSection">
      <div id="status" class="status-box">
        <span class="spinner"></span> LINEを確認中...
      </div>
      <button id="startBtn" class="btn" style="display: none; margin-top: 15px;" onclick="startMainFlow()">開始する</button>
    </div>

    <!-- モード別コンテンツ -->
    <div id="contentSection" style="display: none;">
      
      <!-- 1. 通常モード: OTP入力 -->
      <div id="userLinkingSection" style="display: none;">
        <div class="info-box">
          <strong>使い方</strong><br>
          ① SlackのBotとのDMで「🔗 LINEと連携する」ボタンを押す<br>
          ② 届いた4桁のコードを下の枠に入力する<br>
          ③ 下のボタンを押すと完了！
        </div>
        <label for="otp">Slackで受け取った4桁のコード</label>
        <input type="text" id="otp" maxlength="4" inputmode="numeric" pattern="[0-9]*" placeholder="0000">
        <button id="submitBtn" class="btn" onclick="submitOtp()">連携する</button>
      </div>

      <!-- 2. 寮母モード: 登録/解除 -->
      <div id="dormMotherSection" style="display: none;">
        <div class="info-box">
          <strong id="dormInfoTitle">ご案内</strong><br>
          <span id="dormInfoContent">読み込み中...</span>
        </div>
        <button id="dormActionBtn" class="btn" onclick="handleDormAction()">処理を実行する</button>
      </div>

      <!-- 共通ステータス -->
      <div id="resultStatus" class="status-box" style="display: none;"></div>
    </div>

    <div id="debugArea"></div>
  </div>

  <script>
    /**
     * 設定項目
     */
    const LIFF_ID = "2009629480-rTF4dms1";
    const GAS_ENDPOINT = "https://script.google.com/macros/s/AKfycbx23wbGW0ENBzcoO-D_olYrZONNDPBZvCdzrsPch_7_ozpaArKWQG0OauxTDMUl8FHRSA/exec";

    let lineUserId = null;
    let isDormMotherMode = false;
    let currentDormStatus = null;

    function logDebug(msg) {
      const debug = document.getElementById("debugArea");
      debug.style.display = "block";
      debug.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
    }

    /**
     * モード判定と初期化
     */
    async function init() {
      // モード判定の強化 (URL Search Param + liff.getContext)
      isDormMotherMode = detectMode();
      if (isDormMotherMode) applyDormMotherUI();

      const status = document.getElementById("status");
      try {
        logDebug("LIFF Init start...");
        await liff.init({ liffId: LIFF_ID });
        
        if (!liff.isLoggedIn()) {
          logDebug("Not logged in, redirecting...");
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        lineUserId = profile.userId;
        logDebug("User confirmed: " + profile.displayName);

        status.innerHTML = `<p style="color: #2e7d32; margin-bottom: 10px;">✅ LINEを確認しました</p><strong>${profile.displayName}</strong> さん`;
        document.getElementById("startBtn").style.display = "block";

        // 自動的にメインフローへ進む（寮母モード以外）
        if (!isDormMotherMode) {
          startMainFlow();
        }
      } catch (err) {
        logDebug("Init Error: " + err.message);
        status.className = "status-box error";
        status.textContent = "⚠️ LINE連携に失敗しました。 (" + err.message + ")";
      }
    }

    function detectMode() {
      // 1. URLパラメータから取得
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('mode') === 'dorm_mother') return true;

      // 2. LIFFコンテキストから取得 (一部の環境用)
      try {
        const context = liff.getContext();
        if (context && context.endpointUrl && context.endpointUrl.includes('mode=dorm_mother')) return true;
      } catch (e) { }

      return false;
    }

    function toggleModeManually() {
      isDormMotherMode = !isDormMotherMode;
      if (isDormMotherMode) applyDormMotherUI();
      else location.reload(); // 通常モードに戻す時はリロードが確実
    }

    function applyDormMotherUI() {
      document.body.classList.add("mode-dorm-mother");
      document.getElementById("pageTitle").textContent = "寮母設定 | 食数投票システム";
      document.getElementById("headerTitle").textContent = "寮母さん設定";
      document.getElementById("pageSubtitle").innerHTML = "食数投票の結果をLINEで受け取るための<br>手続きを行います。";
      document.getElementById("logo").textContent = "👩‍🍳";
      if (document.getElementById("contentSection").style.display === "block") {
        document.getElementById("userLinkingSection").style.display = "none";
        document.getElementById("dormMotherSection").style.display = "block";
        checkDormMotherStatus();
      }
    }

    /**
     * 開始ボタン押下
     */
    async function startMainFlow() {
      document.getElementById("initSection").style.display = "none";
      document.getElementById("contentSection").style.display = "block";
      
      if (isDormMotherMode) {
        document.getElementById("dormMotherSection").style.display = "block";
        await checkDormMotherStatus();
      } else {
        document.getElementById("userLinkingSection").style.display = "block";
      }
    }

    /**
     * GAS通信の共通関数
     */
    async function callGasApi(action, extraParams = {}) {
      const body = { action, ...extraParams };
      logDebug(`Request: ${action}...`);

      try {
        const response = await fetch(GAS_ENDPOINT, {
          method: "POST",
          headers: { "Content-Type": "text/plain" }, // CORS回避に最も有効なtext/plainを使用
          body: JSON.stringify(body),
          redirect: "follow"
        });

        if (!response.ok) throw new Error("HTTP " + response.status);
        const text = await response.text();
        logDebug(`Response: ${text.substring(0, 30)}...`);
        return JSON.parse(text);
      } catch (err) {
        logDebug(`Fetch Error: ${err.message}`);
        throw err;
      }
    }

    /**
     * 通常モード：連携実行
     */
    async function submitOtp() {
      const otp = document.getElementById("otp").value.trim();
      const status = document.getElementById("resultStatus");
      const btn = document.getElementById("submitBtn");

      if (!/^\d{4}$/.test(otp)) {
        status.style.display = "block";
        status.className = "status-box error";
        status.textContent = "❌ 4桁の数字を入力してください。";
        return;
      }

      btn.disabled = true;
      status.style.display = "block";
      status.className = "status-box loading";
      status.innerHTML = '<span class="spinner"></span>連携中...';

      try {
        const json = await callGasApi("line_link", { otp, lineUserId });
        if (json.success) {
          status.className = "status-box success";
          status.textContent = "🎉 連携が完了しました！Slackの画面に戻ってください。";
          document.getElementById("otp").disabled = true;
        } else {
          status.className = "status-box error";
          status.textContent = json.message || "❌ 連携に失敗しました。";
          btn.disabled = false;
        }
      } catch (err) {
        status.className = "status-box error";
        status.textContent = "❌ 通信エラー: " + err.message;
        btn.disabled = false;
      }
    }

    /**
     * 寮母モード：ステータス確認
     */
    async function checkDormMotherStatus() {
      const title = document.getElementById("dormInfoTitle");
      const content = document.getElementById("dormInfoContent");
      const btn = document.getElementById("dormActionBtn");
      
      content.innerHTML = '<span class="spinner"></span>サーバーを確認中...';
      btn.disabled = true;

      try {
        const json = await callGasApi("get_dorm_mother_status");
        if (json.success) {
          if (json.dormMotherId === lineUserId) {
            currentDormStatus = "registered_self";
            title.textContent = "登録状況";
            content.innerHTML = "現在、あなたが「寮母さん」として登録されています。";
            btn.textContent = "登録を解除する";
            btn.style.background = "#e53e3e";
          } else if (json.dormMotherId) {
            currentDormStatus = "registered_other";
            title.textContent = "他の方が登録中です";
            content.innerHTML = "現在、別の方が登録されています。上書きしてあなたが登録しますか？";
            btn.textContent = "寮母登録を引き継ぐ";
            btn.style.background = "var(--primary-color)";
          } else {
            currentDormStatus = "none";
            title.textContent = "ご案内";
            content.innerHTML = "このアカウントを「寮母さん」として設定します。";
            btn.textContent = "寮母として登録する";
            btn.style.background = "var(--primary-color)";
          }
          btn.disabled = false;
        }
      } catch (err) {
        content.textContent = "❌ 接続失敗: " + err.message;
      }
    }

    async function handleDormAction() {
      const status = document.getElementById("resultStatus");
      const action = (currentDormStatus === "registered_self") ? "clear_dorm_mother" : "set_dorm_mother";
      
      status.style.display = "block";
      status.className = "status-box loading";
      status.innerHTML = '<span class="spinner"></span>処理中...';

      try {
        const json = await callGasApi(action, { lineUserId: lineUserId });
        if (json.success) {
          status.className = "status-box success";
          status.textContent = "✅ 処理が完了しました。";
          setTimeout(() => {
            status.style.display = "none";
            checkDormMotherStatus();
          }, 1500);
        } else {
          throw new Error(json.message);
        }
      } catch (err) {
        status.className = "status-box error";
        status.textContent = "❌ 失敗: " + err.message;
      }
    }

    init();
  </script>
</body>

</html>
