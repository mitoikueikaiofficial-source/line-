<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title id="pageTitle">LINE連携 | 食数投票システム</title>
  <!-- LIFF SDK -->
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root {
      --primary-color: #06C755;
      --primary-hover: #05b04a;
      --bg-gradient: linear-gradient(135deg, #06C755 0%, #00a844 100%);
    }

    body.mode-dorm-mother {
      --primary-color: #F57C00;
      --primary-hover: #e65100;
      --bg-gradient: linear-gradient(135deg, #FF9800 0%, #F57C00 100%);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
      background: var(--bg-gradient);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 36px 28px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.18);
      text-align: center;
      position: relative;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 19px;
      font-weight: 700;
      color: #111;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: #666;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .info-box {
      background: #f0faf4;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 20px;
      text-align: left;
      font-size: 13px;
      color: #333;
      line-height: 1.7;
    }

    body.mode-dorm-mother .info-box {
      background: #fff8e1;
    }

    .info-box strong {
      color: var(--primary-color);
    }

    .btn {
      width: 100%;
      padding: 15px;
      background: var(--primary-color);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-bottom: 10px;
    }

    .btn:hover {
      background: var(--primary-hover);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .status-box {
      margin-top: 18px;
      font-size: 14px;
      line-height: 1.6;
      padding: 12px;
      border-radius: 8px;
    }

    .status-box.success {
      background-color: #e8f5e9;
      color: #2e7d32;
      font-weight: 700;
    }

    .status-box.error {
      background-color: #ffebee;
      color: #e53e3e;
      font-weight: 600;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid #ccc;
      border-top-color: var(--primary-color);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* 手動切替ボタン */
    #manualSwitch {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 10px;
      color: #ccc;
      padding: 2px 6px;
      border: 1px solid #eee;
      border-radius: 4px;
      cursor: pointer;
      background: #fff;
    }

    /* デバッグ表示 */
    #debug {
      margin-top: 24px;
      padding: 10px;
      background: #f8f8f8;
      border: 1px solid #eee;
      border-radius: 8px;
      font-size: 10px;
      color: #888;
      text-align: left;
      word-break: break-all;
      max-height: 100px;
      overflow-y: auto;
    }
  </style>
</head>

<body>
  <div class="card">
    <div id="manualSwitch" onclick="toggleModeManually()">🔧 表示切替</div>
    
    <div id="logo" class="logo">🔗</div>
    <h1 id="headerTitle">LINEアカウント連携</h1>
    <p id="pageSubtitle" class="subtitle">食数投票システムとLINEを繋いで<br>通知・投票をより便利に！</p>

    <!-- 1. 初期化・ログインセクション -->
    <div id="initSection">
      <div id="status" class="status-box">
        <span class="spinner"></span> 読み込み中...
      </div>
      <button id="startBtn" class="btn" style="display: none; margin-top: 15px;" onclick="startFlow()">開始する</button>
    </div>

    <!-- 2. コンテンツセクション -->
    <div id="contentSection" style="display: none;">
      <!-- 通常モード: OTP入力 -->
      <div id="userSection" style="display: none;">
        <div class="info-box">
          <strong>使い方</strong><br>
          ① Slackで「🔗 LINEと連携する」ボタンを押す<br>
          ② 届いた4桁のコードを入力する<br>
          ③ 「連携する」ボタンを押すと完了！
        </div>
        <input type="text" id="otp" maxlength="4" inputmode="numeric" placeholder="0000" style="width:100%; padding:14px; font-size:24px; letter-spacing:10px; text-align:center; border:2px solid #ddd; border-radius:12px; margin-bottom:15px;">
        <button id="otpSubmitBtn" class="btn" onclick="submitOtp()">連携する</button>
      </div>

      <!-- 寮母モード -->
      <div id="dormSection" style="display: none;">
        <div class="info-box">
          <strong id="dormInfoTitle">ご案内</strong><br>
          <span id="dormInfoContent">読み込み中...</span>
        </div>
        <button id="dormActionBtn" class="btn" onclick="handleDormAction()">反映する</button>
      </div>

      <!-- 共通ステータス -->
      <div id="resultStatus" class="status-box" style="display: none;"></div>
    </div>

    <!-- デバッグ表示 -->
    <div id="debug"></div>
  </div>

  <script>
    /**
     * 設定
     */
    const LIFF_ID = "2009629480-rTF4dms1";
    const GAS_ENDPOINT = "https://script.google.com/macros/s/AKfycbx23wbGW0ENBzcoO-D_oIYrZONNDPBZvCdzrsPch_7_ozpaArKWQG0OauxTDMUl8FHRSA/exec";

    let lineUserId = null;
    let isDormMotherMode = false;
    let currentDormStatus = "none";

    function log(msg) {
      const dbg = document.getElementById("debug");
      dbg.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
      console.log(msg);
    }

    /**
     * モード判定（最優先）
     */
    function detectMode() {
      const params = new URLSearchParams(window.location.search);
      if (params.get("mode") === "dorm_mother") return true;
      if (window.location.href.includes("mode=dorm_mother")) return true;
      return false;
    }

    function toggleModeManually() {
      isDormMotherMode = !isDormMotherMode;
      applyUI();
      log("Manual switch: " + isDormMotherMode);
    }

    function applyUI() {
      if (isDormMotherMode) {
        document.body.classList.add("mode-dorm-mother");
        document.getElementById("pageTitle").innerText = "寮母設定 | 食数投票システム";
        document.getElementById("headerTitle").innerText = "寮母さん設定";
        document.getElementById("pageSubtitle").innerHTML = "投票結果の受け取り設定を行います";
        document.getElementById("logo").innerText = "👩‍🍳";
      } else {
        document.body.classList.remove("mode-dorm-mother");
        document.getElementById("pageTitle").innerText = "LINE連携 | 食数投票システム";
        document.getElementById("headerTitle").innerText = "LINEアカウント連携";
        document.getElementById("pageSubtitle").innerHTML = "SlackとLINEを繋いで便利にします";
        document.getElementById("logo").innerText = "🔗";
      }
    }

    /**
     * 初期化
     */
    async function init() {
      isDormMotherMode = detectMode();
      applyUI();
      
      const status = document.getElementById("status");
      try {
        log("Init Start...");
        await liff.init({ liffId: LIFF_ID });
        
        if (!liff.isLoggedIn()) {
          log("Logged out, login...");
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        lineUserId = profile.userId;
        log("User: " + profile.displayName);

        status.innerHTML = `<p style="color:#2e7d32">✅ LINEを確認しました</p><strong>${profile.displayName}</strong> さん`;
        document.getElementById("startBtn").style.display = "block";

        if (!isDormMotherMode) startFlow(); // ユーザー連携は自動で次へ
      } catch (err) {
        log("Error: " + err.message);
        status.className = "status-box error";
        status.innerText = "⚠️ 接続失敗: " + err.message;
      }
    }

    function startFlow() {
      document.getElementById("initSection").style.display = "none";
      document.getElementById("contentSection").style.display = "block";
      if (isDormMotherMode) {
        document.getElementById("dormSection").style.display = "block";
        checkDormStatus();
      } else {
        document.getElementById("userSection").style.display = "block";
      }
    }

    /**
     * 通信
     */
    async function callGas(action, extra = {}) {
      const url = new URL(GAS_ENDPOINT);
      url.searchParams.append("action", action);
      for (const key in extra) {
        url.searchParams.append(key, extra[key]);
      }

      log("API (GET): " + action);
      
      try {
        const response = await fetch(url.toString(), {
          method: "GET",
          redirect: "follow"
        });

        if (!response.ok) throw new Error("HTTP " + response.status);
        const json = await response.json();
        log("Done");
        return json;
      } catch (err) {
        log("API Error: " + err.message);
        throw err;
      }
    }

    /**
     * ユーザー連携
     */
    async function submitOtp() {
      const otp = document.getElementById("otp").value.trim();
      const status = document.getElementById("resultStatus");
      if (!/^\d{4}$/.test(otp)) {
        status.style.display = "block";
        status.className = "status-box error";
        status.innerText = "❌ 4桁を入力してください";
        return;
      }
      status.style.display = "block";
      status.className = "status-box loading";
      status.innerHTML = '<span class="spinner"></span>処理中...';
      try {
        const res = await callGas("line_link", { otp, lineUserId });
        if (res.success) {
          status.className = "status-box success";
          status.innerText = "🎉 連携完了！Slackに戻ってください。";
        } else {
          status.className = "status-box error";
          status.innerText = res.message || "❌ 失敗";
        }
      } catch (e) {
        status.className = "status-box error";
        status.innerText = "❌ エラー: " + e.message;
      }
    }

    /**
     * 寮母設定
     */
    async function checkDormStatus() {
      const content = document.getElementById("dormInfoContent");
      const btn = document.getElementById("dormActionBtn");
      content.innerHTML = '<span class="spinner"></span>確認中...';
      btn.disabled = true;
      try {
        const res = await callGas("get_dorm_mother_status");
        if (res.success) {
          if (res.dormMotherId === lineUserId) {
            currentDormStatus = "registered_self";
            content.innerHTML = "現在、あなたが登録されています。";
            btn.innerText = "登録を解除する";
            btn.style.background = "#e53e3e";
          } else if (res.dormMotherId) {
            currentDormStatus = "registered_other";
            content.innerHTML = "現在、別の方が登録されています。上書きしますか？";
            btn.innerText = "登録を上書きする";
            btn.style.background = "var(--primary-color)";
          } else {
            currentDormStatus = "none";
            content.innerHTML = "あなたが寮母さんとして登録し、集計を受け取ります。";
            btn.innerText = "登録する";
            btn.style.background = "var(--primary-color)";
          }
          btn.disabled = false;
        }
      } catch (e) {
        content.innerText = "❌ エラー: " + e.message;
      }
    }

    async function handleDormAction() {
      const action = (currentDormStatus === "registered_self") ? "clear_dorm_mother" : "set_dorm_mother";
      const status = document.getElementById("resultStatus");
      status.style.display = "block";
      status.className = "status-box loading";
      status.innerHTML = '<span class="spinner"></span>送信中...';
      try {
        const res = await callGas(action, { lineUserId });
        if (res.success) {
          status.className = "status-box success";
          status.innerText = "✅ 反映しました。";
          setTimeout(() => {
            status.style.display = "none";
            checkDormStatus();
          }, 1500);
        } else {
          throw new Error(res.message);
        }
      } catch (e) {
        status.className = "status-box error";
        status.innerText = "❌ 失敗: " + e.message;
      }
    }

    init();
  </script>
</body>

</html>
