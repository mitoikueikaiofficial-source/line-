<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>寮母登録 | 食数投票システム</title>
  <!-- LIFF SDK -->
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
      background: linear-gradient(135deg, #FF9800 0%, #F57C00 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 36px 28px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.18);
      text-align: center;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #111;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: #666;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .info-box {
      background: #fff8e1;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 24px;
      text-align: left;
      font-size: 13px;
      color: #333;
      line-height: 1.7;
    }

    .info-box strong {
      color: #F57C00;
    }

    .btn {
      width: 100%;
      padding: 15px;
      background: #F57C00;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-bottom: 10px;
    }

    .btn:hover {
      background: #e65100;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .status-box {
      margin-top: 18px;
      font-size: 14px;
      line-height: 1.6;
      padding: 12px;
      border-radius: 8px;
    }

    .status-box.success {
      background-color: #e8f5e9;
      color: #2e7d32;
      font-weight: 700;
    }

    .status-box.error {
      background-color: #ffebee;
      color: #e53e3e;
      font-weight: 600;
    }

    .status-box.loading {
      color: #888;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid #ccc;
      border-top-color: #F57C00;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* デバッグ用 */
    #debug {
      margin-top: 20px;
      font-size: 10px;
      color: #999;
      text-align: left;
      word-break: break-all;
      background: #f9f9f9;
      padding: 8px;
      border-radius: 4px;
      display: none;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="logo">👩‍🍳</div>
    <h1>寮母さん設定</h1>
    <p class="subtitle" id="pageSubtitle">食数投票の結果をLINEで受け取るための<br>手続きを行います。</p>

    <!-- 初期表示: LINEログイン確認 -->
    <div id="initSection">
      <div id="status" class="status-box">
        <span class="spinner"></span> LINEを確認中...
      </div>
      <button id="startBtn" class="btn" style="display: none; margin-top: 15px;" onclick="startApp()">登録状況を確認する</button>
    </div>

    <!-- 共通ステータス表示 -->
    <div id="globalStatus" class="status-box" style="display: none;"></div>

    <!-- 1. 未登録 / 他人が登録中の表示 -->
    <div id="registerSection" style="display: none;">
      <div class="info-box">
        <strong id="registerInfoTitle">ご案内</strong><br>
        <span id="registerInfoContent">下のボタンを押すと、あなたのLINEアカウントを「寮母さん」として登録します。<br>
        登録が完了すると、毎週の集計結果がこのアカウント宛に届くようになります。</span>
      </div>
      <button id="registerBtn" class="btn" onclick="registerDormMother()">寮母として登録する</button>
    </div>

    <!-- 2. 自分が登録中の表示 -->
    <div id="unregisterSection" style="display: none;">
      <div class="info-box">
        <strong id="unregisterInfoTitle">登録状況</strong><br>
        <span id="unregisterInfoContent">現在、あなたが「寮母さん」として登録されています。<br>
        集計結果の受け取りを停止する場合は、下のボタンで解除してください。</span>
      </div>
      <button id="unregisterBtn" class="btn" onclick="unregisterDormMother()" style="background: #e53e3e;">登録を解除する</button>
    </div>

    <div id="debug"></div>
  </div>

  <script>
    /**
     * 設定項目
     */
    const LIFF_ID = "2009629480-XsMoiaNI";
    const GAS_ENDPOINT = "https://script.google.com/macros/s/AKfycbx23wbGW0ENBzcoO-D_olYrZONNDPBZvCdzrsPch_7_ozpaArKWQG0OauxTDMUl8FHRSA/exec";

    let lineUserId = null;

    function logDebug(msg) {
      const debug = document.getElementById("debug");
      debug.style.display = "block";
      debug.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
    }

    /**
     * LIFFの初期化
     */
    async function init() {
      const status = document.getElementById("status");
      try {
        logDebug("LIFF Init start...");
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) {
          logDebug("Not logged in, redirecting to login...");
          liff.login();
          return;
        }
        const profile = await liff.getProfile();
        lineUserId = profile.userId;
        logDebug("LINE User confirmed: " + profile.displayName);
        status.innerHTML = `<p style="color: #2e7d32; margin-bottom: 10px;">✅ LINEを確認しました</p><strong>${profile.displayName}</strong> さん`;
        document.getElementById("startBtn").style.display = "block";
      } catch (err) {
        logDebug("LIFF Init Error: " + err.message);
        console.error("LIFF Init Error:", err);
        status.className = "status-box error";
        status.textContent = "⚠️ LINE情報の取得に失敗しました。 (" + err.message + ")";
      }
    }

    /**
     * 開始ボタン押下
     */
    async function startApp() {
      document.getElementById("initSection").style.display = "none";
      await checkCurrentStatus();
    }

    /**
     * サーバーと汎用的に通信する関数
     * CORS対策として Content-Type: text/plain を使用（Simple Requestとして扱う）
     */
    async function callGasApi(action, extraParams = {}) {
      const body = {
        action: action,
        ...extraParams
      };

      logDebug(`Fetching: ${action}...`);

      try {
        const response = await fetch(GAS_ENDPOINT, {
          method: "POST",
          headers: { 
            "Content-Type": "text/plain" // CORS回避の要: simple requestにする
          },
          body: JSON.stringify(body),
          redirect: "follow"
        });

        if (!response.ok) {
          logDebug(`HTTP error! status: ${response.status}`);
          throw new Error("HTTP " + response.status);
        }

        const text = await response.text();
        logDebug(`Response received (${text.length} chars)`);
        
        try {
          return JSON.parse(text);
        } catch (e) {
          logDebug("JSON Parse Error: " + text.substring(0, 50));
          throw new Error("JSON Parse Error");
        }
      } catch (err) {
        logDebug(`Fetch catch: ${err.message}`);
        throw err;
      }
    }

    /**
     * 登録状況の確認
     */
    async function checkCurrentStatus() {
      const status = document.getElementById("globalStatus");
      const registerSection = document.getElementById("registerSection");
      const unregisterSection = document.getElementById("unregisterSection");
      
      status.style.display = "block";
      status.className = "status-box loading";
      status.innerHTML = '<span class="spinner"></span>サーバーに接続中...';

      try {
        const json = await callGasApi("get_dorm_mother_status");
        if (json.success) {
          status.style.display = "none";
          if (json.dormMotherId === lineUserId) {
            registerSection.style.display = "none";
            unregisterSection.style.display = "block";
          } else if (json.dormMotherId) {
            registerSection.style.display = "block";
            unregisterSection.style.display = "none";
            document.getElementById("registerInfoTitle").textContent = "引き継ぎのご案内";
            document.getElementById("registerInfoContent").innerHTML = "現在、別のアカウントが登録されています。<br>あなたが新しく寮母さんになる場合は、下から登録を上書きしてください。";
            document.getElementById("registerBtn").textContent = "寮母登録を引き継ぐ";
          } else {
            registerSection.style.display = "block";
            unregisterSection.style.display = "none";
            document.getElementById("registerInfoTitle").textContent = "ご案内";
            document.getElementById("registerInfoContent").innerHTML = "下のボタンを押し、あなたのLINEアカウントを「寮母さん」として登録します。";
            document.getElementById("registerBtn").textContent = "寮母として登録する";
          }
        }
      } catch (err) {
        status.className = "status-box error";
        status.textContent = "❌ 接続失敗: " + err.message;
      }
    }

    /**
     * 登録実行
     */
    async function registerDormMother() {
      if (!confirm("あなたを「寮母さん」として登録します。よろしいですか？")) return;
      const status = document.getElementById("globalStatus");
      status.style.display = "block";
      status.className = "status-box loading";
      status.innerHTML = '<span class="spinner"></span>登録処理中...';
      try {
        const json = await callGasApi("set_dorm_mother", { lineUserId: lineUserId });
        if (json.success) {
          status.className = "status-box success";
          status.textContent = "🎉 登録完了！通知が届くようになります。";
          setTimeout(checkCurrentStatus, 1500);
        } else {
          throw new Error(json.message);
        }
      } catch (err) {
        status.className = "status-box error";
        status.textContent = "❌ 登録失敗: " + err.message;
      }
    }

    /**
     * 解除実行
     */
    async function unregisterDormMother() {
      if (!confirm("登録を解除します。よろしいですか？")) return;
      const status = document.getElementById("globalStatus");
      status.style.display = "block";
      status.className = "status-box loading";
      status.innerHTML = '<span class="spinner"></span>解除処理中...';
      try {
        const json = await callGasApi("clear_dorm_mother");
        if (json.success) {
          status.className = "status-box success";
          status.textContent = "✅ 解除しました。";
          setTimeout(checkCurrentStatus, 1500);
        } else {
          throw new Error(json.message);
        }
      } catch (err) {
        status.className = "status-box error";
        status.textContent = "❌ 解除失敗: " + err.message;
      }
    }

    // 開始
    init();
  </script>
</body>

</html>
